# Prerequisites: cp gateway.yaml.example gateway.yaml && cp .env.example .env
services:
  gateway:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./gateway.yaml:/app/gateway.yaml:ro
    env_file:
      - .env         # put all LLM API keys here (OPENAI_API_KEY, ANTHROPIC_API_KEY, etc.)
    restart: unless-stopped
